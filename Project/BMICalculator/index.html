<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>BMI Calculator</h1>

        <form>
            <p><label for="weight">Weight (kg):</label>
            <input type="number" id="weight" required></p>
            
            <p>
            <label for="height">Height (cm):</label>
            <input type="number" id="height" required></p>
            

            <button type="submit">Calculate BMI</button>

            <div id="result"></div>

            <div id="weight-guide">
                <h3>Weight Guide:</h3>
                <p>Underweight: Less than 18.5</p>
                <p>Normal weight: BMI 18.5 - 24.9</p>
                <p>Overweight: BMI 25 - 29.9</p>
                <p>Obesity: Greater than or equal to 30</p>
            </div>

        </form>
    </div>
    
</body>
<script src="app.js"></script>
</html>
